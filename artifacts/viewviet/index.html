<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>ViewViet</title>
    <meta name="description" content="ViewViet — Your trusted cross-border content hub for Chinese expats in Southeast Asia." />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="ViewViet" />
    <meta property="og:description" content="ViewViet — Language learning, travel guides, legal insights and community for Chinese expats." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ViewViet" />
    <meta name="twitter:description" content="ViewViet — Your trusted cross-border content hub." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- ── Google Translate: hide all default UI chrome ── -->
    <style>
      /* Suppress the Google Translate top banner */
      .goog-te-banner-frame.skiptranslate { display: none !important; }
      /* Prevent Google from pushing the body down */
      body { top: 0px !important; }
      /* Hide the gadget widget itself (we control it programmatically) */
      #google_translate_element { display: none !important; }
      .goog-te-gadget { display: none !important; }
      /* Hide hover tooltip that Google injects */
      .goog-tooltip { display: none !important; }
      .goog-tooltip:hover { display: none !important; }
      /* Hide the "Translated by Google" watermark */
      .goog-logo-link { display: none !important; }
      /* Suppress the blinking iframe bar */
      .VIpgJd-ZVi9od-aZ2wEe-wOHMyf { display: none !important; }
      .VIpgJd-ZVi9od-aZ2wEe { display: none !important; }
      /* Some environments inject this extra bar */
      .skiptranslate iframe { display: none !important; }
    </style>

    <script>
      // Called by Google Translate once its script loads
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          {
            pageLanguage: 'zh-CN',
            includedLanguages: 'en,vi,zh-CN',
            autoDisplay: false,
          },
          'google_translate_element'
        );
      }

      // Helper used by layout.tsx: trigger translation to a given language code.
      // Pass 'zh-CN' to restore original Chinese.
      window.vvSwitchGoogleTranslate = function(targetLang) {
        if (targetLang === 'zh-CN') {
          // Restore original: clear cookie then reload
          var host = location.hostname;
          document.cookie = 'googtrans=; expires=Thu,01 Jan 1970 00:00:00 UTC; path=/;';
          document.cookie = 'googtrans=; expires=Thu,01 Jan 1970 00:00:00 UTC; path=/; domain=' + host;
          document.cookie = 'googtrans=; expires=Thu,01 Jan 1970 00:00:00 UTC; path=/; domain=.' + host;
          window.location.reload();
          return;
        }
        // Use the doGTranslate global if available (no reload needed)
        var fn = window.doGTranslate;
        if (typeof fn === 'function') {
          fn('zh-CN|' + targetLang);
          return;
        }
        // Fallback: set cookie and reload
        var cookieVal = '/zh-CN/' + targetLang;
        document.cookie = 'googtrans=' + cookieVal + '; path=/';
        document.cookie = 'googtrans=' + cookieVal + '; path=/; domain=.' + location.hostname;
        window.location.reload();
      };
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" async></script>
  </head>
  <body>
    <!-- Hidden Google Translate mount point -->
    <div id="google_translate_element"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
