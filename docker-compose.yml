version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: viewviet_db
    environment:
      POSTGRES_USER: viewviet_user
      POSTGRES_PASSWORD: viewviet_password_123
      POSTGRES_DB: viewviet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U viewviet_user -d viewviet"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - viewviet

  redis:
    image: redis:7-alpine
    container_name: viewviet_redis
    ports:
      - "6379:6379"
    networks:
      - viewviet

volumes:
  postgres_data:

networks:
  viewviet:
    driver: bridge
